<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — SnapMark Media</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Instrument Serif', 'serif'],
            body: ['Barlow', 'sans-serif']
          }
        }
      }
    };
  </script>
  <style>
    body {
      background: radial-gradient(circle at 50% 50%, #110e26 0%, #000000 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .glow-orb {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, rgba(0,0,0,0) 70%);
      filter: blur(40px);
      z-index: 0;
      pointer-events: none;
    }
    
    .liquid-glass {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 
        0 8px 32px 0 rgba(0, 0, 0, 0.37),
        inset 0 1px 1px rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
      border-radius: 1.25rem;
    }
    
    .liquid-glass::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.02) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
  </style>
</head>
<body class="p-6 font-body">
  <div class="glow-orb -top-20 -left-20"></div>
  <div class="glow-orb -bottom-20 -right-20"></div>

  <div id="login-container" class="max-w-md w-full liquid-glass p-8 z-10">
    <div class="text-center mb-8">
      <h1 class="font-heading text-5xl italic text-white mb-2">Admin Portal</h1>
      <p class="text-white/60 text-xs tracking-wider uppercase">// Snapmark Media</p>
    </div>

    <form id="login-form" class="space-y-5">
      <div>
        <label for="email" class="block text-xs font-semibold text-white/70 mb-2 uppercase tracking-wider">Email Address</label>
        <input type="email" id="email" required placeholder="admin@snapmarkmedia.com" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-purple-500/50 transition-colors duration-200">
      </div>
      <div>
        <label for="password" class="block text-xs font-semibold text-white/70 mb-2 uppercase tracking-wider">Password</label>
        <input type="password" id="password" required placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-purple-500/50 transition-colors duration-200">
      </div>

      <div id="error-banner" class="hidden text-red-400 text-xs bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-3 leading-relaxed"></div>

      <button type="submit" id="submit-btn" class="w-full py-3 bg-white text-black font-semibold text-sm rounded-full hover:bg-white/90 transition-all duration-200 flex items-center justify-center gap-2">
        Login
      </button>

      <div id="signup-hint" class="hidden text-center pt-4 text-xs text-white/40 border-t border-white/5">
        No administrator registered yet? <a href="admin-signup.html" class="text-white hover:underline">Setup Admin</a>
      </div>
    </form>
  </div>

  <!-- Supabase & Custom SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/admin.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Check current session
      const session = await window.adminService.getCurrentSession();
      if (session) {
        window.location.href = 'admin.html';
        return;
      }

      // Check if admin setup is needed
      const adminExists = await window.adminService.checkAdminExists();
      if (!adminExists) {
        document.getElementById('signup-hint').classList.remove('hidden');
      }

      const form = document.getElementById('login-form');
      const errorBanner = document.getElementById('error-banner');
      const submitBtn = document.getElementById('submit-btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorBanner.classList.add('hidden');
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        submitBtn.disabled = true;
        submitBtn.innerText = 'Verifying...';

        try {
          await window.adminService.signInAdmin(email, password);
          window.location.href = 'admin.html';
        } catch (err) {
          console.error(err);
          errorBanner.innerText = err.message || 'Invalid email or password.';
          errorBanner.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.innerText = 'Login';
        }
      });
    });
  </script>
</body>
</html>
