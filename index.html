<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>Snapmark Media — Premium Creative Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Instrument Serif', 'serif'],
            body: ['Barlow', 'sans-serif']
          },
          borderRadius: { DEFAULT: '9999px' }
        }
      }
    };
  </script>
  <style>
    html { scroll-behavior: smooth; background: #000; }
    body { margin: 0; background: #000; color: #fff; overflow-x: hidden; }
    body.no-scroll { overflow: hidden; }
    * { box-sizing: border-box; }
    ::selection { background: rgba(255,255,255,.9); color: #000; }

    .global-background {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    #root { position: relative; z-index: 1; }
    .site-background-media { opacity: 0 !important; visibility: hidden; }

    /* ── Cinematic Hero additions ───────────────────────── */
    .intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
    }

    .service-panel-active {
      box-shadow:
        0 0 30px rgba(100, 180, 255, 0.18),
        0 0 60px rgba(100, 180, 255, 0.06),
        inset 0 1px 1px rgba(255, 255, 255, 0.15) !important;
    }

    .liquid-glass {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.15) 80%,
        rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .liquid-glass-strong {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: none;
      box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass-strong::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.2) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.2) 80%,
        rgba(255,255,255,0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    button, a { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
  <div class="global-background" aria-hidden="true"></div>
  <div id="root"></div>



  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
  <script>window.Motion = window.FramerMotion || window.Motion;</script>
  
  <!-- Supabase Client & Contact Integration -->

  <script type="text/babel" src="js/icons.jsx"></script>
  <script type="text/babel" src="js/DynamicWaveBackground.jsx"></script>
  <script type="text/babel" src="js/FadingVideo.jsx"></script>
  <script type="text/babel" src="js/BlurText.jsx"></script>
  <script type="text/babel" src="js/ServicesData.jsx"></script>
  <script type="text/babel" src="js/useMouseParallax.jsx"></script>
  <script type="text/babel" src="js/AmbientEffects.jsx"></script>
  <script type="text/babel" src="js/LogoOrbit.jsx"></script>
  <script type="text/babel" src="js/ServiceContent.jsx"></script>
  <script type="text/babel" src="js/IntroSequence.jsx"></script>
  <script type="text/babel" src="js/CinematicHero.jsx"></script>
  <script type="text/babel" src="js/Navbar.jsx"></script>
  <script type="text/babel" src="js/Hero.jsx"></script>
  <script type="text/babel" src="js/ProfileSection.jsx"></script>
  <script type="text/babel" src="js/ReviewsSection.jsx"></script>
  <script type="text/babel" src="js/ContentSections.jsx"></script>
  <script type="text/babel" src="js/CursorGlow.jsx"></script>
  <script type="text/babel" src="js/App.jsx"></script>
</body>
</html>
