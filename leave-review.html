<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Review — SnapMark Media</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Instrument Serif', 'serif'],
            body: ['Barlow', 'sans-serif']
          }
        }
      }
    };
  </script>
  <style>
    body {
      background: radial-gradient(circle at 50% 50%, #110e26 0%, #000000 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    .glow-orb {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, rgba(0,0,0,0) 70%);
      filter: blur(40px);
      z-index: 0;
      pointer-events: none;
    }

    .liquid-glass {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 
        0 8px 32px 0 rgba(0, 0, 0, 0.37),
        inset 0 1px 1px rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
      border-radius: 1.25rem;
    }

    .liquid-glass::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.01) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* Custom input/select/textarea styling */
    input, select, textarea {
      background: rgba(255, 255, 255, 0.03) !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      color: #fff !important;
      transition: all 0.3s ease;
    }

    input:focus, select:focus, textarea:focus {
      outline: none !important;
      border-color: rgba(139, 92, 246, 0.5) !important;
      background: rgba(255, 255, 255, 0.05) !important;
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.15);
    }

    select option {
      background: #110e26;
      color: #fff;
    }

    /* Star selection styles */
    .star-btn {
      color: rgba(255, 255, 255, 0.2);
      transition: transform 0.2s ease, color 0.2s ease;
    }
    .star-btn:hover {
      transform: scale(1.2);
    }
    .star-btn.active {
      color: #fbbf24;
      text-shadow: 0 0 10px rgba(251, 191, 36, 0.4);
    }
  </style>
</head>
<body class="p-6 font-body">
  <div class="glow-orb -top-20 -left-20"></div>
  <div class="glow-orb -bottom-20 -right-20"></div>


  <!-- Review Card -->
  <div class="max-w-xl w-full liquid-glass p-8 md:p-10 my-16 z-10">
    <div class="text-center mb-8">
      <h1 class="font-heading text-5xl italic text-white mb-2">Leave a Review</h1>
      <p class="text-white/60 text-xs tracking-wider uppercase">// We Value Your Feedback</p>
    </div>

    <!-- Success Message Container -->
    <div id="success-container" class="hidden text-center py-10 space-y-6">
      <div class="inline-flex items-center justify-center h-16 w-16 rounded-full bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 mb-4 animate-bounce">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="h-8 w-8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <h2 class="font-heading text-3xl italic text-white">Thank You!</h2>
      <p class="text-white/70 text-sm max-w-sm mx-auto leading-relaxed">
        Your review has been successfully submitted and saved. We appreciate you taking the time to share your experience with SnapMark Media!
      </p>
    </div>

    <!-- Review Form -->
    <form id="review-form" class="space-y-6">
      <!-- Client Name -->
      <div>
        <label for="client-name" class="block text-xs font-semibold text-white/70 mb-2 uppercase tracking-wider">Client Name *</label>
        <input type="text" id="client-name" required placeholder="Your name or company" class="w-full rounded-xl px-4 py-3 text-sm">
      </div>

      <!-- Grid for Service & Rating -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Service Used -->
        <div>
          <label for="service-used" class="block text-xs font-semibold text-white/70 mb-2 uppercase tracking-wider">Service Used *</label>
          <select id="service-used" required class="w-full rounded-xl px-4 py-3 text-sm appearance-none cursor-pointer">
            <option value="" disabled selected>Select a service</option>
            <option value="Video Editing">Video Editing</option>
            <option value="Reels & Shorts Editing">Reels & Shorts Editing</option>
            <option value="Motion Graphics">Motion Graphics</option>
            <option value="Graphic Design">Graphic Design</option>
            <option value="Social Media Management">Social Media Management</option>
            <option value="Thumbnail Design">Thumbnail Design</option>
            <option value="Photo Editing">Photo Editing</option>
            <option value="Wedding Invitation Design">Wedding Invitation Design</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <!-- Star Rating -->
        <div>
          <label class="block text-xs font-semibold text-white/70 mb-2 uppercase tracking-wider">Star Rating *</label>
          <div class="flex items-center gap-1.5 py-2" id="star-rating-container">
            <button type="button" data-rating="1" class="star-btn text-2xl focus:outline-none">★</button>
            <button type="button" data-rating="2" class="star-btn text-2xl focus:outline-none">★</button>
            <button type="button" data-rating="3" class="star-btn text-2xl focus:outline-none">★</button>
            <button type="button" data-rating="4" class="star-btn text-2xl focus:outline-none">★</button>
            <button type="button" data-rating="5" class="star-btn text-2xl focus:outline-none">★</button>
          </div>
          <input type="hidden" id="star-rating-val" required>
        </div>
      </div>

      <!-- Photo Upload (Optional) -->
      <div>
        <label class="block text-xs font-semibold text-white/70 mb-2 uppercase tracking-wider">Client Photo (Optional)</label>
        <div class="flex items-center gap-4">
          <!-- Avatar Preview -->
          <div class="h-16 w-16 rounded-full border border-white/10 bg-white/5 flex items-center justify-center overflow-hidden flex-shrink-0" id="avatar-preview-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="h-8 w-8 text-white/30" id="avatar-placeholder">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
            </svg>
            <img src="" alt="Preview" class="hidden h-full w-full object-cover" id="avatar-preview-img">
          </div>
          <!-- Custom Upload Button -->
          <div class="flex-grow">
            <label for="photo-file" class="inline-flex items-center justify-center px-4 py-2.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl font-semibold text-xs text-white/80 transition-colors duration-200 cursor-pointer">
              Choose Photo
            </label>
            <input type="file" id="photo-file" accept="image/*" class="hidden">
            <span class="block text-[10px] text-white/40 mt-1.5">JPG or PNG. Max size 5MB. Automatically compressed.</span>
          </div>
        </div>
      </div>

      <!-- Detailed Review -->
      <div>
        <label for="detailed-review" class="block text-xs font-semibold text-white/70 mb-2 uppercase tracking-wider">Detailed Review *</label>
        <textarea id="detailed-review" required rows="4" placeholder="How was your experience working with us? What did you like best?" class="w-full rounded-xl px-4 py-3 text-sm resize-none"></textarea>
      </div>

      <!-- Error / Submit Message -->
      <div id="error-banner" class="hidden text-red-400 text-xs bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-3 leading-relaxed"></div>

      <!-- Submit Button -->
      <button type="submit" id="submit-btn" class="w-full py-3 bg-white text-black font-semibold text-sm rounded-full hover:bg-white/90 transition-all duration-200 flex items-center justify-center gap-2">
        Submit Review
      </button>
    </form>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const supabaseUrl = 'https://amzrzysnwbfnldnyricg.supabase.co';
      const supabaseAnonKey = 'sb_publishable_f6yhgk7fBqV46E872LyKEg__mQfkTKk';

      const starButtons = document.querySelectorAll('.star-btn');
      const starRatingInput = document.getElementById('star-rating-val');
      const photoFileInput = document.getElementById('photo-file');
      const avatarPreviewImg = document.getElementById('avatar-preview-img');
      const avatarPlaceholder = document.getElementById('avatar-placeholder');
      const form = document.getElementById('review-form');
      const successContainer = document.getElementById('success-container');
      const errorBanner = document.getElementById('error-banner');
      const submitBtn = document.getElementById('submit-btn');

      let compressedPhotoBase64 = null;

      // 1. Star Rating Interactive Logic
      starButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          const rating = parseInt(btn.dataset.rating);
          starRatingInput.value = rating;
          
          starButtons.forEach(s => {
            const r = parseInt(s.dataset.rating);
            if (r <= rating) {
              s.classList.add('active');
            } else {
              s.classList.remove('active');
            }
          });
        });
      });

      // 2. Client-side Image Compression to Base64
      photoFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (file.size > 5 * 1024 * 1024) {
          alert("Image file size exceeds 5MB. Please choose a smaller file.");
          photoFileInput.value = '';
          return;
        }

        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            // Draw on canvas to resize/compress
            const canvas = document.createElement('canvas');
            const maxDim = 256;
            let w = img.width;
            let h = img.height;

            if (w > h) {
              if (w > maxDim) {
                h = Math.round(h * (maxDim / w));
                w = maxDim;
              }
            } else {
              if (h > maxDim) {
                w = Math.round(w * (maxDim / h));
                h = maxDim;
              }
            }

            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);

            // Compress to JPEG at 0.75 quality
            compressedPhotoBase64 = canvas.toDataURL('image/jpeg', 0.75);

            // Show avatar preview
            avatarPreviewImg.src = compressedPhotoBase64;
            avatarPreviewImg.classList.remove('hidden');
            avatarPlaceholder.classList.add('hidden');
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      });

      // 3. Form Submit to Supabase
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorBanner.classList.add('hidden');

        const rating = parseInt(starRatingInput.value);
        if (!rating) {
          errorBanner.innerText = 'Please select a star rating.';
          errorBanner.classList.remove('hidden');
          return;
        }

        const clientName = document.getElementById('client-name').value.trim();
        const serviceUsed = document.getElementById('service-used').value;
        const detailedReview = document.getElementById('detailed-review').value.trim();

        submitBtn.disabled = true;
        submitBtn.innerText = 'Submitting...';

        const payload = {
          client_name: clientName,
          service_used: serviceUsed,
          rating: rating,
          detailed_review: detailedReview,
          photo_url: compressedPhotoBase64,
          status: 'Pending'
        };

        try {
          const response = await fetch(`${supabaseUrl}/rest/v1/reviews`, {
            method: 'POST',
            headers: {
              'apikey': supabaseAnonKey,
              'Content-Type': 'application/json',
              'Prefer': 'return=minimal'
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`Submission failed: ${errorText}`);
          }

          // Show success message, hide form
          form.classList.add('hidden');
          successContainer.classList.remove('hidden');
        } catch (err) {
          console.error(err);
          errorBanner.innerText = err.message || 'There was a problem submitting your review. Please try again.';
          errorBanner.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.innerText = 'Submit Review';
        }
      });
    });
  </script>
</body>
</html>
